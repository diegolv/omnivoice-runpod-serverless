name: Build and Push Docker Image

on:
  # O workflow será acionado quando houver push nas branches main ou master
  push:
    branches: [ "main", "master" ]
  # Permite que você clique num botão para rodar o build manualmente na interface do GitHub
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
      
    # Passos importantes para liberar espaço no runner do GitHub. 
    # Imagens de IA são enormes e podem estourar o limite de disco gratuito do GitHub Actions sem isso.
    - name: Liberar espaço em disco
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: false
        swap-storage: true
        
    - name: Configurar o Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Fazer Login no Docker Hub
      uses: docker/login-action@v3
      with:
        # Estas são variáveis secretas que você vai configurar no GitHub (instruções na mensagem)
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build e Push da imagem
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: sfdiego/omnivoice-runpod-serverless:latest
        provenance: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
